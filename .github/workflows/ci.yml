name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node (match .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Python (match backend/.python-version)
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/.python-version"

      - name: Install (npm workspaces)
        run: npm ci

      # Run lint/build via workspace; run tsc from frontend/ so project root + path aliases
      # resolve the same as local IDE (avoids npm workspace cwd quirks on some runners).
      - name: Frontend lint
        run: npm run lint --workspace=frontend

      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend build
        run: npm run build --workspace=frontend

      - name: Backend tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          make test
