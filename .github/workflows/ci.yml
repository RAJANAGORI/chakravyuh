name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node (match .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Python (match backend/.python-version)
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/.python-version"

      - name: Install (npm workspaces)
        run: npm ci

      - name: Frontend lint
        run: npm run lint --workspace=frontend

      # Hoisted installs omit frontend/node_modules/.bin/tsc — run the workspace TypeScript
      # from the repo root with an explicit project file (fixes TS2307 @/ aliases on CI).
      - name: Frontend typecheck
        run: npx tsc --noEmit -p frontend/tsconfig.json

      - name: Frontend build
        run: npm run build --workspace=frontend

      - name: Backend tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          make test
